name: Daily run

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SLACK_BOT_TOKEN }}" ] || [ -z "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" ] || [ -z "${{ secrets.GMAIL_IMPERSONATE_EMAIL }}" ]; then
            echo "Required secrets are missing. Set SLACK_BOT_TOKEN, GOOGLE_SERVICE_ACCOUNT_JSON, and GMAIL_IMPERSONATE_EMAIL."
            exit 1
          fi
      - run: python -m pip install -r requirements.txt
      - name: Write service account credentials
        run: |
          mkdir -p ${{ github.workspace }}/secrets
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > ${{ github.workspace }}/secrets/service-account.json
      - run: python -m src.run --once
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GMAIL_AUTH_MODE: service
          GOOGLE_SERVICE_ACCOUNT_FILE: ${{ github.workspace }}/secrets/service-account.json
          GMAIL_IMPERSONATE_EMAIL: ${{ secrets.GMAIL_IMPERSONATE_EMAIL }}
