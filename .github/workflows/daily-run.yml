name: Daily run

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.SLACK_BOT_TOKEN }}" ] || [ -z "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" ] || [ -z "${{ secrets.GMAIL_IMPERSONATE_EMAIL }}" ]; then
            echo "Required secrets are not configured; skipping this run (expected on a fork)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.ready == 'true'
        with:
          python-version: '3.11'

      - run: python -m pip install -r requirements.txt
        if: steps.check.outputs.ready == 'true'

      - name: Write service account credentials
        if: steps.check.outputs.ready == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "${{ github.workspace }}/secrets"
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > "${{ github.workspace }}/secrets/service-account.json"

      - run: python -m src.run --once
        if: steps.check.outputs.ready == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GMAIL_AUTH_MODE: service
          GOOGLE_SERVICE_ACCOUNT_FILE: ${{ github.workspace }}/secrets/service-account.json
          GMAIL_IMPERSONATE_EMAIL: ${{ secrets.GMAIL_IMPERSONATE_EMAIL }}
